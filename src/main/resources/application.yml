server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # Local filesystem config — each service has its own file here
          search-locations: classpath:/config
        # Uncomment for Git-based config in production:
        # git:
        #   uri: https://github.com/your-org/ruby-music-config
        #   default-label: main
        #   clone-on-start: true

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: false
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.config: INFO
    com.rubymusic: DEBUG
