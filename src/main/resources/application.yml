server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # Local filesystem config — each service has its own file here
          search-locations: classpath:/config
        # Uncomment for Git-based config in production:
        # git:
        #   uri: https://github.com/your-org/ruby-music-config
        #   default-label: main
        #   clone-on-start: true

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: false
    register-with-eureka: true

# ── Config-server encryption ──────────────────────────────────────────────────
# When ENCRYPT_KEY is set, config-server exposes /encrypt and /decrypt endpoints
# and resolves {cipher}... values in any served YAML file at read time.
# For development, the default 'changeme-dev-only' key is intentionally weak.
# MANDATORY: set a strong random key (≥32 chars) in staging and production via
# the ENCRYPT_KEY environment variable.
encrypt:
  key: ${ENCRYPT_KEY:changeme-dev-only}

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh,env
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

logging:
  level:
    org.springframework.cloud.config: INFO
    com.rubymusic: DEBUG
