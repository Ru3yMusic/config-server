server:
  port: 8080

spring:
  cloud:
    gateway:
      # Eureka-based service discovery for lb:// URIs
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # Global CORS — iOS client connects from any origin in dev
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization

      routes:
        # ── AUTH SERVICE — no JWT required ───────────────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        # ── CATALOG SERVICE — JWT required ───────────────────────────────────
        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/api/v1/catalog/**
          filters:
            - name: JwtAuthFilter

        # ── INTERACTION SERVICE — JWT required ───────────────────────────────
        - id: interaction-service
          uri: lb://interaction-service
          predicates:
            - Path=/api/v1/interactions/**
          filters:
            - name: JwtAuthFilter

        # ── PLAYLIST SERVICE — JWT required ──────────────────────────────────
        - id: playlist-service
          uri: lb://playlist-service
          predicates:
            - Path=/api/v1/playlists/**
          filters:
            - name: JwtAuthFilter

        # ── SOCIAL SERVICE — JWT required ────────────────────────────────────
        - id: social-service
          uri: lb://social-service
          predicates:
            - Path=/api/v1/social/**
          filters:
            - name: JwtAuthFilter

      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  # Same RSA public key used by auth-service — only the public key is needed here.
  public-key: ${JWT_PUBLIC_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.rubymusic.gateway: DEBUG
