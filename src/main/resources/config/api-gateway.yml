server:
  port: 8080

spring:
  data:
    redis:
      # Same Redis instance used by realtime-ws-ms and realtime-api-ms for
      # presence tracking and badge counters. No separate Redis needed.
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      # Eureka-based service discovery for lb:// URIs
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # Global CORS — env-var driven across all environments.
      #
      # Local dev default:  http://localhost:4200 (Angular dev server)
      # Prod override:      set CORS_ALLOWED_ORIGINS to the deployed frontend origin
      #                     (e.g. http://159.112.140.232:4200 or https://app.rubymusic.io)
      #
      # CORS_ALLOW_CREDENTIALS: keep false unless the frontend uses cookies / basic auth.
      # JWT in `Authorization: Bearer ...` does NOT require credentials.
      #
      # NOTE: For multiple origins from env var, comma-separated values are NOT split
      # automatically here — extend with SpEL (#{...split(',')}) when a second origin
      # is needed. Today there is only one prod origin, so single-value is enough.
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - ${CORS_ALLOWED_HEADERS:*}
            exposedHeaders:
              - Authorization
            allowCredentials: ${CORS_ALLOW_CREDENTIALS:false}
            maxAge: 3600

      routes:
        # ── AUTH SERVICE — no JWT required ───────────────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: authServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # ── CATALOG SERVICE — JWT required ───────────────────────────────────
        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/api/v1/catalog/**
          filters:
            - name: JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: catalogServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # ── INTERACTION SERVICE — JWT required ───────────────────────────────
        - id: interaction-service
          uri: lb://interaction-service
          predicates:
            - Path=/api/v1/interactions/**
          filters:
            - name: JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: interactionServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # ── PLAYLIST SERVICE — JWT required ──────────────────────────────────
        - id: playlist-service
          uri: lb://playlist-service
          predicates:
            - Path=/api/v1/playlists/**
          filters:
            - name: JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: playlistServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # ── SOCIAL SERVICE — JWT required ────────────────────────────────────
        - id: social-service
          uri: lb://social-service
          predicates:
            - Path=/api/v1/social/**
          filters:
            - name: JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: socialServiceCircuitBreaker
                fallbackUri: forward:/fallback

        # ── REALTIME WS-MS (NestJS :3001) — JWT required ─────────────────────
        # Comment likes are handled by ws-ms (it publishes the Kafka event)
        - id: realtime-ws-comments-like
          uri: http://${REALTIME_WS_HOST:localhost}:${REALTIME_WS_PORT:3001}
          predicates:
            - Path=/api/v1/realtime/comments/*/like
            - Method=POST,DELETE
          filters:
            - name: JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/api/v1/realtime/(?<segment>.*), /api/${segment}
            - name: CircuitBreaker
              args:
                name: realtimeWsCircuitBreaker
                fallbackUri: forward:/fallback

        # WebSocket (Socket.IO) — JWT validated by gateway, x-user-id injected before forwarding
        # iOS client MUST use forceWebsockets: true to skip HTTP polling (direct WS upgrade)
        # NOTE: JwtAuthFilter NO se aplica aquí. El upgrade WebSocket del navegador
        # no puede incluir el header Authorization (prohibido por la spec del browser)
        # y Socket.IO envía el token en el handshake payload (auth.token), no en un
        # header HTTP. La validación JWT del socket se hace en realtime-ws-ms
        # (StationGateway.extractUserId) con la misma public key compartida.
        - id: realtime-ws-socketio
          uri: http://${REALTIME_WS_HOST:localhost}:${REALTIME_WS_PORT:3001}
          predicates:
            - Path=/socket.io/**
          filters:
            - name: CircuitBreaker
              args:
                name: realtimeWsSocketioCircuitBreaker
                fallbackUri: forward:/fallback

        # Presence endpoints (Chat Estación screen + Amigos online badges)
        - id: realtime-ws-presence
          uri: http://${REALTIME_WS_HOST:localhost}:${REALTIME_WS_PORT:3001}
          predicates:
            - Path=/api/v1/realtime/presence/**
          filters:
            - name: JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/api/v1/realtime/(?<segment>.*), /api/${segment}
            - name: CircuitBreaker
              args:
                name: realtimeWsPresenceCircuitBreaker
                fallbackUri: forward:/fallback

        # ── REALTIME API-MS (NestJS :3002) — JWT required ────────────────────
        # Comments list + delete (CRUD persistence via MongoDB)
        - id: realtime-api-comments
          uri: http://${REALTIME_API_HOST:localhost}:${REALTIME_API_PORT:3002}
          predicates:
            - Path=/api/v1/realtime/comments/**
          filters:
            - name: JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/api/v1/realtime/(?<segment>.*), /api/${segment}
            - name: CircuitBreaker
              args:
                name: realtimeApiCommentsCircuitBreaker
                fallbackUri: forward:/fallback

        # Notifications + badges
        - id: realtime-api-notifications
          uri: http://${REALTIME_API_HOST:localhost}:${REALTIME_API_PORT:3002}
          predicates:
            - Path=/api/v1/realtime/notifications/**
          filters:
            - name: JwtAuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:50}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:100}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - RewritePath=/api/v1/realtime/(?<segment>.*), /api/${segment}
            - name: CircuitBreaker
              args:
                name: realtimeApiNotificationsCircuitBreaker
                fallbackUri: forward:/fallback

      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  # Same RSA public key used by auth-service — only the public key is needed here.
  public-key: ${JWT_PUBLIC_KEY}

# ── Resilience4j circuit breaker + time-limiter ──────────────────────────────
# All circuit breakers inherit from the 'default' config unless overridden.
# slidingWindowType: COUNT_BASED — trips after failureRateThreshold% failures
#   in the last slidingWindowSize calls (minimumNumberOfCalls must be reached first).
# waitDurationInOpenState: gateway stays OPEN (failing fast) for 10 s before
#   transitioning to HALF-OPEN to probe the service.
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
        minimumNumberOfCalls: 20
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
    prometheus:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.rubymusic.gateway: DEBUG
