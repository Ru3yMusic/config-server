server:
  port: 8082
  tomcat:
    # Catalog is the hottest read path (home, search, library, station detail).
    # 400 threads + accept-count 100 keeps the home from stalling under burst.
    threads:
      max: ${TOMCAT_THREADS_MAX:400}
      min-spare: ${TOMCAT_THREADS_MIN_SPARE:50}
    accept-count: ${TOMCAT_ACCEPT_COUNT:100}
    connection-timeout: 20000

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/catalog_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Pool sized for the new Tomcat width. connection-timeout 5s fails fast
      # rather than holding the thread when the pool is exhausted.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:50}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 20

  # Kafka: bootstrap-servers, serializers y auto-offset-reset vienen del shared
  # application.yml. Acá seteamos lo per-service:
  #   consumer.group-id  → identidad del consumer
  #   producer.acks=all  → confirma sólo cuando TODOS los replicas tienen el mensaje
  #   producer.retries=3 → reintenta errores transitorios automáticamente
  kafka:
    consumer:
      group-id: catalog-service
    producer:
      acks: all
      retries: 3

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true

logging:
  level:
    # Default INFO en prod. Override con LOG_LEVEL_CATALOG=DEBUG en .env local.
    com.rubymusic.catalog: ${LOG_LEVEL_CATALOG:INFO}

# Zero-Trust: RSA public key for JWT validation (Base64-encoded X.509/SPKI format).
# Heredamos el valor del shared application.yml — no hace falta redeclararlo,
# pero lo dejamos explícito para que sea obvio en este servicio.
jwt:
  public-key: ${JWT_PUBLIC_KEY}

# NOTA: catalog-service NO consume APIs de otros servicios — solo VALIDA JWTs
# entrantes (rol USER o SERVICE) y EXPONE endpoints internos. Por eso no
# declara `internal.service-secret` (no necesita pedirle un service token a
# auth-service). Si en el futuro agregás un cliente, el secret viene heredado
# del shared application.yml (${INTERNAL_SERVICE_SECRET}).
