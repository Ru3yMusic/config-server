# ─────────────────────────────────────────────────────────────────────────────
# Shared defaults loaded by ALL microservices from the Config Server.
# Service-specific values override these in their own application.yml.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
  # ── Kafka shared defaults ──────────────────────────────────────────────────
  # Override KAFKA_BOOTSTRAP_SERVERS in each environment (docker-compose, k8s, etc.)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    # ── Confluent Cloud (SASL_SSL) support ────────────────────────────────────
    # LOCAL:  leave KAFKA_SECURITY_PROTOCOL unset (defaults to PLAINTEXT — no auth)
    # PROD:   set KAFKA_SECURITY_PROTOCOL=SASL_SSL + CONFLUENT_API_KEY/SECRET
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${CONFLUENT_API_KEY:}"
        password="${CONFLUENT_API_SECRET:}";
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.rubymusic: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# ── Zero-trust M2M: shared RSA public key + internal secret ──────────────────
# MANDATORY: JWT_PUBLIC_KEY must be set to the RSA public key from auth-service
# in ALL environments (dev, staging, prod). There is no safe default — if unset,
# all JWT validation will fail at startup.
jwt:
  public-key: ${JWT_PUBLIC_KEY}

# MANDATORY in prod: each client service MUST receive INTERNAL_SERVICE_SECRET
# in its environment (passed via docker-compose.prod.yml). The dev default
# below is intentionally weak and must NEVER be used outside local development.
internal:
  service-secret: ${INTERNAL_SERVICE_SECRET:ruby-secret-2026-service}


