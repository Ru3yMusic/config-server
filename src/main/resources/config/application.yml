# ─────────────────────────────────────────────────────────────────────────────
# Shared defaults loaded by ALL microservices from the Config Server.
# Service-specific values override these in their own application.yml.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.rubymusic: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# ── Zero-trust M2M: shared RSA public key + internal secret ──────────────────
jwt:
  public-key: ${JWT_PUBLIC_KEY}

internal:
  service-secret: ${INTERNAL_SERVICE_SECRET:ruby-internal-secret-change-in-prod}
