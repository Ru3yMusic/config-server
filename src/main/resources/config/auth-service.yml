server:
  port: 8081
  tomcat:
    # Tuned for login/register peaks plus internal token + user lookup traffic
    # from social/interaction. 400 threads absorb burst, accept-count 100 holds
    # the rest in queue instead of dropping at TCP level.
    threads:
      max: ${TOMCAT_THREADS_MAX:400}
      min-spare: ${TOMCAT_THREADS_MIN_SPARE:50}
    accept-count: ${TOMCAT_ACCEPT_COUNT:100}
    connection-timeout: 20000

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/auth_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # PG is remote (latency-bound), so larger pool absorbs connection-acquire
      # spikes during peak hours. connection-timeout 5s fails fast: a hung
      # checkout used to hold the request thread for 30s, cascading freezes.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:50}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    # Defaults vacíos para no romper startup en local sin SMTP configurado.
    # Si no se setean, los envíos fallan en runtime (no al boot) — el flujo
    # de signup tira excepción al intentar enviar el OTP de verificación.
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  # Base64-encoded RSA keys (strip PEM headers before encoding).
  # Generate:  openssl genrsa -out private.pem 2048
  #            openssl pkcs8 -topk8 -nocrypt -in private.pem -out pk8.pem
  #            openssl rsa -in private.pem -pubout -out public.pem
  # Export:    export JWT_PRIVATE_KEY=$(grep -v PRIVATE pk8.pem | tr -d '\n')
  #            export JWT_PUBLIC_KEY=$(grep  -v PUBLIC  public.pem | tr -d '\n')
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  access-token-expiration-ms: 3600000     # 60 minutes
  refresh-token-expiration-days: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true

logging:
  level:
    # Default INFO en prod (DEBUG genera ruido y expone IDs/emails en logs).
    # Para debugging local: setear LOG_LEVEL_AUTH=DEBUG en el .env del IDE.
    com.rubymusic.auth: ${LOG_LEVEL_AUTH:INFO}
    org.springframework.security: WARN
