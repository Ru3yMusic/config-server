server:
  port: 8084
  tomcat:
    # /playlists/my hits on every /user/* navigation — must survive bursts to
    # avoid being the new bottleneck after upstream services are widened.
    threads:
      max: ${TOMCAT_THREADS_MAX:400}
      min-spare: ${TOMCAT_THREADS_MIN_SPARE:50}
    accept-count: ${TOMCAT_ACCEPT_COUNT:100}
    connection-timeout: 20000

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/playlist_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Pool sized for the new Tomcat width. connection-timeout 5s fails fast
      # rather than holding the thread when the pool is exhausted.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:50}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Kafka: bootstrap-servers + serializers vienen del shared application.yml.
  # Acá los flags de durabilidad específicos del producer:
  #   acks=all   → confirma escritura sólo cuando TODOS los replicas la tienen
  #   retries=3  → reintenta errores transitorios automáticamente
  kafka:
    producer:
      acks: all
      retries: 3

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true

jwt:
  public-key: ${JWT_PUBLIC_KEY}

logging:
  level:
    # Default INFO en prod. Override con LOG_LEVEL_PLAYLIST=DEBUG en .env local.
    com.rubymusic.playlist: ${LOG_LEVEL_PLAYLIST:INFO}
