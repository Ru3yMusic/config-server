# ─────────────────────────────────────────────────────────────────────────────
# api-gateway — PROD profile overrides
# Loaded when spring.profiles.active=prod (merged on top of api-gateway.yml).
#
# MANDATORY env vars:
#   CORS_ALLOWED_ORIGINS — comma-separated list of allowed origins,
#                          e.g. https://app.rubymusic.io,https://rubymusic.io
# ─────────────────────────────────────────────────────────────────────────────

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS}"

gateway:
  rate-limit:
    replenish-rate: 10
    burst-capacity: 20
